<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 인생 기록실</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  :root{
    --bg:#F6F6F6; --surface:#FFFFFF; --ink:#111111; --ink-soft:#8A8A8A;
    --line:#E6E6E6; --accent:#111111; --accent-soft:#F0F0F0; --accent-deep:#000000;
    --pink:#8A8A8A; --pink-soft:#F0F0F0; --pink-deep:#555555;
    --yellow:#CFCFCF; --yellow-soft:#F5F5F5; --yellow-deep:#777777;
    --teal:#555555; --teal-soft:#EFEFEF;
    --hi:#111111; --mid:#8A8A8A; --lo:#CFCFCF;
    --paper:#FAFAFA; --radius:16px;
    --serif:"Noto Serif KR","Nanum Myeongjo",serif;
    --sans:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    --shadow:0 1px 10px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;min-height:100vh}
  /* 레이아웃: 왼쪽 사이드바 + 콘텐츠 */
  .layout{display:flex;min-height:100vh;align-items:stretch}
  .side{width:225px;min-width:225px;background:#111;color:#fff;padding:28px 16px 20px;display:flex;flex-direction:column;justify-content:space-between;position:sticky;top:0;height:100vh;transition:width .22s,min-width .22s,padding .22s;overflow:hidden}
  .side.collapsed{width:0;min-width:0;padding-left:0;padding-right:0;border:none}
  .side.collapsed *{opacity:0;pointer-events:none}
  .side-toggle{position:fixed;top:16px;left:16px;z-index:15;width:34px;height:34px;border-radius:99px;border:1.5px solid #111;background:#fff;color:#111;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:left .22s}
  .side-toggle.side-open{left:239px}
  .brand{font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:-.5px;line-height:1.3;padding:0 8px}
  .today-line{font-size:12px;opacity:.6;margin:8px 8px 0}
  nav{margin-top:26px;display:flex;flex-direction:column;gap:4px}
  nav button{background:none;border:none;font:inherit;font-size:14px;color:#9C9C9C;padding:11px 13px;cursor:pointer;border-radius:11px;text-align:left;display:flex;align-items:center;gap:10px;width:100%}
  nav button:hover{color:#fff;background:rgba(255,255,255,.08)}
  nav button.on{color:#111;background:#fff;font-weight:700}
  .nav-ico{width:18px;text-align:center;font-size:14px}
  .side-foot{display:flex;gap:6px}
  .side-foot .top-btn{flex:1}
  .top-btn{font:inherit;font-size:12.5px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);color:#fff;border-radius:99px;padding:7px 10px;cursor:pointer}
  .top-btn:hover{background:rgba(255,255,255,.22)}
  .content{flex:1;min-width:0}
  main{max-width:1000px;margin:0 auto;padding:28px 24px 80px}
  /* 모바일: 사이드바 → 상단 바 */
  @media(max-width:780px){
    .layout{flex-direction:column}
    .side{width:100%;min-width:0;height:auto;position:static;padding:18px 16px 14px}
    .side.collapsed{width:100%;min-width:0;padding:0;height:0}
    .side.collapsed *{display:none}
    .brand br{display:none}
    .today-line{margin-top:4px}
    nav{margin-top:14px;flex-direction:row;overflow-x:auto;gap:4px;padding-bottom:2px}
    nav button{width:auto;white-space:nowrap;padding:8px 12px;font-size:13px}
    .nav-ico{display:none}
    .side-foot{position:absolute;top:18px;right:14px}
    .side{position:relative}
    main{padding:20px 16px 70px}
    .side-toggle{top:auto;bottom:16px;left:16px !important}
  }
  .grid{display:grid;gap:16px}
  .grid.two{grid-template-columns:1fr 1fr}
  @media(max-width:780px){.grid.two{grid-template-columns:1fr}}
  .card{background:var(--surface);border-radius:var(--radius);padding:20px 20px 17px;box-shadow:var(--shadow)}
  .card h2{font-family:var(--serif);font-size:16.5px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card h2 .sub{font-family:var(--sans);font-size:12px;color:var(--ink-soft);font-weight:400}
  input,textarea,select{font:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:10px;padding:8px 11px;background:#FCFBFE;color:var(--ink);width:100%}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:#fff}
  button.btn{font:inherit;font-size:13.5px;border:none;border-radius:10px;padding:9px 15px;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;font-weight:600}
  button.btn:hover{background:var(--accent-deep)}
  button.btn.ghost{background:var(--accent-soft);color:var(--accent-deep)}
  button.icon{background:none;border:none;cursor:pointer;font-size:13px;color:var(--ink-soft);padding:2px 6px;border-radius:6px}
  button.icon:hover{background:var(--accent-soft)}
  .row{display:flex;gap:8px;align-items:center}
  .row.wrapm{flex-wrap:wrap}
  ul.plain{list-style:none}
  .item{display:flex;align-items:flex-start;gap:9px;padding:10px 4px;border-bottom:1px dashed var(--line)}
  .item:last-child{border-bottom:none}
  .item .txt{flex:1;font-size:14.5px}
  .item.done .txt{text-decoration:line-through;color:var(--ink-soft)}
  .chk{width:18px;height:18px;min-width:18px;margin-top:3px;accent-color:var(--accent);cursor:pointer}
  .tag{font-size:11px;padding:2px 8px;border-radius:99px;margin-top:3px;white-space:nowrap;border:1.5px solid transparent;font-weight:600}
  .tag.p1{background:#111;color:#fff}
  .tag.p2{background:#fff;color:#444;border-color:#BBB}
  .tag.p3{background:#F0F0F0;color:#999}
  .cat{font-size:11px;padding:2px 8px;border-radius:99px;margin-top:3px;white-space:nowrap;font-weight:600;border:1.5px solid #111;background:#fff;color:#111}
  .empty{color:var(--ink-soft);font-size:13.5px;padding:16px 4px;text-align:center}
  .bar{height:8px;background:var(--accent-soft);border-radius:99px;overflow:hidden;margin-top:7px}
  .bar>div{height:100%;background:#111;border-radius:99px;transition:width .3s}
  .bar.teal{background:#EFEFEF}.bar.teal>div{background:#555}
  /* 달력 */
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .cal-head b{font-family:var(--serif);font-size:17px}
  table.cal{width:100%;border-collapse:separate;border-spacing:4px;table-layout:fixed}
  table.cal th{font-size:12.5px;color:var(--ink-soft);padding:6px 0;font-weight:600}
  table.cal th:first-child{color:var(--hi)}
  table.cal td{height:96px;vertical-align:top;padding:7px 6px;font-size:13px;cursor:pointer;background:#F7F7F7;border-radius:12px;transition:background .15s}
  table.cal td:hover{background:#EBEBEB}
  table.cal td.dim{background:transparent;cursor:default}
  table.cal td.past{background:#DEDEDE}
  table.cal td.past:hover{background:#D0D0D0}
  table.cal td.past .dnum{color:#8D8D8D}
  table.cal td.past .cell-ev{background:#6E6E6E}
  table.cal td.past .cell-td{border-color:#B3B3B3;color:#828282}
  table.cal td.today .dnum{background:var(--accent);color:#fff;border-radius:99px;padding:1px 8px}
  table.cal td.sel{outline:2.5px solid var(--accent);background:#fff}
  .dnum{font-weight:600;font-size:13.5px}
  .cell-ev{background:#111;color:#fff;border-radius:5px;padding:1px 5px;margin-top:3px;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .cell-td{background:#fff;border:1px solid #C9C9C9;color:#333;border-radius:5px;padding:1px 5px;margin-top:3px;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .cell-td.done{text-decoration:line-through;color:#AAA;border-color:#E2E2E2}
  .cell-more{font-size:10.5px;color:var(--ink-soft);margin-top:3px;font-weight:600}
  @media(max-width:640px){table.cal td{height:70px;padding:4px}.dnum{font-size:12px}.cell-ev,.cell-td{font-size:9.5px;padding:0 3px}}
  /* 날짜 팝업 */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:18px;max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:22px 22px 18px;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .modal h3{font-family:var(--serif);font-size:18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .m-sec{margin-top:16px}
  .m-sec .m-title{font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;border-bottom:1.5px solid var(--accent);padding-bottom:5px;margin-bottom:4px}
  .dot.ev{background:#111}
  .dot.td{background:#AAA}
  .dot.dy{background:#fff;border:1.5px solid #111}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--ink-soft);margin-top:10px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  /* 날짜 패널 서브탭 */
  .day-tabs{display:flex;gap:5px;margin-bottom:13px;background:var(--bg);border-radius:99px;padding:4px}
  .day-tabs button{font:inherit;font-size:13px;flex:1;padding:7px 4px;border:none;border-radius:99px;background:none;cursor:pointer;color:var(--ink-soft)}
  .day-tabs button.on{background:#fff;color:#111;font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.12)}
  /* 버킷 타임라인 */
  .timeline{position:relative;margin:14px 0 6px;padding-left:22px;border-left:2.5px solid var(--accent)}
  .tl-node{position:relative;margin-bottom:17px}
  .tl-node::before{content:"";position:absolute;left:-29px;top:6px;width:11px;height:11px;border-radius:99px;background:var(--surface);border:3px solid var(--accent)}
  .tl-node.done::before{background:var(--accent)}
  .tl-age{font-family:var(--serif);font-weight:700;color:var(--accent-deep);font-size:15px}
  .tl-node.done .tl-txt{text-decoration:line-through;color:var(--ink-soft)}
  /* 일기 */
  .diary-entry{border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:12px;background:var(--paper);cursor:pointer}
  .diary-entry:hover{border-color:var(--accent)}
  .diary-entry .d-head{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);margin-bottom:6px}
  .diary-entry .d-body{white-space:pre-wrap;font-size:14.5px}
  .mood-pick{display:flex;gap:4px;flex-wrap:wrap}
  .mood-pick button{font-size:19px;background:none;border:2px solid transparent;border-radius:9px;cursor:pointer;padding:2px 4px}
  .mood-pick button.on{border-color:var(--accent);background:var(--accent-soft)}
  .subtabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .subtabs button{font:inherit;font-size:13px;padding:7px 15px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-soft)}
  .subtabs button.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
  .chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .chips button{font:inherit;font-size:12.5px;padding:5px 13px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink-soft)}
  .chips button.on.all{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chips button.on.task{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chips button.on.growth{background:var(--teal);color:#fff;border-color:var(--teal)}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:9px}
  /* 리치 메모 편집기 */
  .memo-edit{border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;min-height:76px;font-size:14px;background:#FCFBFE;outline:none;line-height:1.55}
  .memo-edit:focus{border-color:#111}
  .memo-edit:empty:before{content:attr(data-placeholder);color:var(--ink-soft)}
  .memo-toolbar{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:8px}
  .memo-toolbar button{border:1.5px solid var(--line);background:#fff;border-radius:7px;width:26px;height:26px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:#111}
  .memo-toolbar button:hover{background:var(--bg)}
  .memo-toolbar .swatch{border-radius:99px;width:20px;height:20px;border:1.5px solid var(--line)}
  .memo-toolbar .sep{width:1px;height:18px;background:var(--line);margin:0 2px}
  .save-note{position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;font-size:13px;padding:9px 15px;border-radius:99px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9}
  .save-note.show{opacity:.92}
  .mt{margin-top:12px}
  .stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 18px;flex:1;min-width:130px}
  .stat{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--accent-deep)}
  .stat-label{font-size:12px;color:var(--ink-soft)}
  .home-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  /* 로그인 게이트 */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
  .gate-box{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:44px 36px;max-width:380px;width:100%;text-align:center}
  .gate-box .brand{font-size:23px;padding:0;margin-bottom:6px}
  .gate-box p{color:var(--ink-soft);font-size:13.5px;margin-bottom:26px}
  .gate-box button{width:100%;padding:12px;border-radius:11px;font:inherit;font-weight:700;font-size:14.5px;cursor:pointer;margin-bottom:9px}
  .gate-btn-primary{background:#111;color:#fff;border:none}
  .gate-btn-secondary{background:#fff;color:#111;border:1.5px solid #111}
  .user-chip{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.08);border-radius:11px;padding:9px 12px;margin-bottom:8px;font-size:12.5px}
  .user-chip .em{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #appRoot{display:none}
</style>
</head>
<body>

<div class="gate" id="gateScreen">
  <div class="gate-box">
    <div class="brand">나의 인생 기록실</div>
    <p>로그인하면 나만의 일정·투두·가계부가<br>안전하게 저장됩니다.</p>
    <button class="gate-btn-primary" onclick="netlifyIdentity.open('login')">로그인</button>
    <button class="gate-btn-secondary" onclick="netlifyIdentity.open('signup')">회원가입</button>
  </div>
</div>

<div id="appRoot">
<button class="side-toggle side-open" id="sideToggle" onclick="toggleSide()">☰</button>
<div class="layout">
  <aside class="side" id="sideBar">
    <div>
      <div class="brand">나의<br>인생 기록실</div>
      <div class="today-line" id="todayLine"></div>
      <nav id="nav">
        <button data-v="home" class="on"><span class="nav-ico">⌂</span> 홈</button>
        <button data-v="cal"><span class="nav-ico">▦</span> 일정관리</button>
        <button data-v="todo"><span class="nav-ico">✓</span> 투두리스트</button>
        <button data-v="growth"><span class="nav-ico">↗</span> 자기계발</button>
        <button data-v="bucket"><span class="nav-ico">★</span> 버킷리스트</button>
        <button data-v="money"><span class="nav-ico">₩</span> 가계부</button>
        <button data-v="diary"><span class="nav-ico">✎</span> 일기</button>
      </nav>
    </div>
    <div>
      <div class="user-chip"><span class="em" id="userEmail"></span><button class="icon" style="color:#fff" onclick="doLogout()" title="로그아웃">⏻</button></div>
      <div class="side-foot">
        <button class="top-btn" onclick="exportData()">⬇ 백업</button>
        <button class="top-btn" onclick="document.getElementById('impFile').click()">⬆ 복원</button>
        <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
      </div>
    </div>
  </aside>
  <div class="content">
    <main id="main"></main>
  </div>
</div>
<div class="save-note" id="saveNote">저장되었습니다 ✓</div>
</div>

<script>
/* ================= 데이터 & 저장 ================= */
const KEY='life-hub-v1';
let D={events:[],todos:{daily:[],monthly:[],yearly:[]},growth:[],bucket:[],diary:[],ledger:[],fixed:[],loans:[],savings:[],categories:['해야 하는 일','자기계발']};

function hasLocal(){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch(e){return false;}}
const useLocal=hasLocal(); // 로그인 전/임시 백업용

function migrate(){ // 예전 데이터 보정
  if(!Array.isArray(D.categories)||!D.categories.length)D.categories=['해야 하는 일','자기계발'];
  const LEGACY={task:'해야 하는 일',growth:'자기계발'};
  ['daily','monthly','yearly'].forEach(k=>(D.todos[k]||[]).forEach(t=>{
    if(!t.cat)t.cat='해야 하는 일';
    else if(LEGACY[t.cat])t.cat=LEGACY[t.cat]; // 예전 코드(task/growth)를 실제 이름으로 변환
    if(!D.categories.includes(t.cat))D.categories.push(t.cat); // 예전 데이터에만 있던 카테고리도 목록에 보존
  }));
  (D.growth||[]).forEach(g=>{if(!Array.isArray(g.checks))g.checks=[];});
  if(!Array.isArray(D.ledger))D.ledger=[];
  if(!Array.isArray(D.fixed))D.fixed=[];
  if(!Array.isArray(D.loans))D.loans=[];
  if(!Array.isArray(D.savings))D.savings=[];
}
async function load(){
  try{
    const user=netlifyIdentity.currentUser();
    if(user){
      const token=await user.jwt();
      const res=await fetch('/.netlify/functions/data',{headers:{Authorization:'Bearer '+token}});
      if(res.ok){
        const j=await res.json();
        if(j&&j.value)D=Object.assign(D,JSON.parse(j.value));
      }
    }else if(useLocal){
      const r=localStorage.getItem(KEY);
      if(r)D=Object.assign(D,JSON.parse(r));
    }
  }catch(e){console.error('불러오기 실패',e);}
  migrate();render();
}
let saveTimer=null;
async function doSaveNow(){
  try{
    const user=netlifyIdentity.currentUser();
    if(user){
      const token=await user.jwt();
      const res=await fetch('/.netlify/functions/data',{
        method:'POST',
        headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
        body:JSON.stringify(D),
        keepalive:true // 페이지가 닫히거나 이동 중이어도 요청이 끝까지 전송되도록 보장
      });
      if(res.ok)toast();
    }
    if(useLocal)localStorage.setItem(KEY,JSON.stringify(D)); // 로컬에도 백업
  }catch(e){console.error('저장 실패',e);}
}
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSaveNow,350);
}
function toast(){const n=document.getElementById('saveNote');n.classList.add('show');setTimeout(()=>n.classList.remove('show'),1100);}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayS=()=>fmt(new Date());
const PRI={1:'높음',2:'보통',3:'낮음'};
/* 카테고리는 이제 이름(문자열) 자체를 저장/표시합니다. D.categories에서 관리 */

/* ================= 상태 ================= */
let view='home', todoTab='daily', todoCat='all', calY, calM, calSel=todayS(), dayTab='ev',
    diaryMood='🙂', diaryEditId=null, calDiaryEditId=null, calDiaryMood='🙂', modalOpen=false,
    monY, monM, monType='out', editTarget=null, moneyBank='all',
    dyPendingPhotos=[], calDyPendingPhotos=[], photoView=null,
    evMemoOpen=false, dayTdMemoOpen=false, todoMemoOpen=false, memoView=null, evColorPick='#111111',
    checkMemoOpen={};
const now=new Date(); calY=now.getFullYear(); calM=now.getMonth(); monY=calY; monM=calM;
document.getElementById('todayLine').textContent=
  now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})+' · 오늘도 한 걸음씩';

document.getElementById('nav').addEventListener('click',e=>{

/* 사진을 적당한 크기로 압축해서 base64로 변환 (저장 용량 절약) */
function compressImage(file,maxW=1000,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>reject(new Error('이미지를 읽을 수 없습니다'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('파일을 읽을 수 없습니다'));
    reader.readAsDataURL(file);
  });
}

/* ================= 일정관리 (달력 + 날짜 패널) ================= */
function calHTML(){
  const first=new Date(calY,calM,1), start=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  let cells='',d=1;
  for(let r=0;r<6&&d<=days;r++){
    cells+='<tr>';
    for(let c=0;c<7;c++){
      if((r===0&&c<start)||d>days){cells+='<td class="dim"></td>';continue;}
      const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const evs=D.events.filter(e=>e.date===ds).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      const tds=D.todos.daily.filter(t=>t.date===ds).sort((a,b)=>a.done-b.done||a.pri-b.pri);
      const hasDy=D.diary.some(x=>x.date===ds);
      const items=[...evs.map(e=>({t:'ev',o:e})),...tds.map(t=>({t:'td',o:t}))];
      const MAX=3;
      const shown=items.slice(0,MAX).map(it=>it.t==='ev'
        ?`<div class="cell-ev" style="background:${it.o.color||'#111111'}">${esc(it.o.title)}</div>`
        :`<div class="cell-td ${it.o.done?'done':''}">${it.o.done?'✓':'▢'} ${esc(it.o.text)}</div>`).join('');
      const more=items.length>MAX?`<div class="cell-more">+${items.length-MAX}개 더보기</div>`:'';
      cells+=`<td class="${ds<todayS()?'past ':''}${ds===todayS()?'today ':''}${ds===calSel?'sel':''}" onclick="openDay('${ds}')">
        <span class="dnum">${d}</span>${hasDy?' <span style="font-size:11px">📔</span>':''}
        ${shown}${more}</td>`;
      d++;
    }
    cells+='</tr>';
  }
  return `
  <div class="card">
    <div class="cal-head">
      <button class="icon" onclick="moveM(-1)">◀</button>
      <b>${calY}년 ${calM+1}월</b>
      <button class="icon" onclick="moveM(1)">▶</button>
    </div>
    <table class="cal"><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr>${cells}</table>
    <div class="legend">
      <span><span class="cell-ev" style="margin:0">일정</span></span>
      <span><span class="cell-td" style="margin:0">▢ 할 일</span></span>
      <span>📔 일기 있는 날</span>
      <span style="opacity:.75">날짜를 누르면 그 날의 모든 기록이 팝업으로 열려요</span>
    </div>
  </div>
  ${modalOpen?dayModalHTML():''}
  <div class="card mt">
    <h2>${Number(calSel.slice(5,7))}월 ${Number(calSel.slice(8))}일 ${['일','월','화','수','목','금','토'][new Date(calSel+'T00:00').getDay()]}요일</h2>
    <div class="day-tabs">
      <button class="${dayTab==='ev'?'on':''}" onclick="setDayTab('ev')">📅 일정</button>
      <button class="${dayTab==='td'?'on':''}" onclick="setDayTab('td')">✅ 할 일</button>
      <button class="${dayTab==='dy'?'on':''}" onclick="setDayTab('dy')">📔 일기</button>
    </div>
    ${dayTab==='ev'?dayEvHTML():dayTab==='td'?dayTdHTML():dayDyHTML()}
  </div>`;
}

function dayModalHTML(){
  const w=['일','월','화','수','목','금','토'][new Date(calSel+'T00:00').getDay()];
  const evs=D.events.filter(e=>e.date===calSel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const tds=D.todos.daily.filter(t=>t.date===calSel).sort((a,b)=>a.done-b.done||a.pri-b.pri);
  return `
  <div class="overlay" onclick="if(event.target===this)closeDay()">

        <button class="icon" style="font-size:17px" onclick="closeDay()">✕</button></h3>

      ${!evs.length&&!tds.length?'<div class="empty">이 날의 기록이 없습니다.</div>':`
      <ul class="plain" style="margin-top:8px">
        ${evs.map(e=>`<li class="item"><span class="txt"><span style="display:inline-block;width:9px;height:9px;border-radius:99px;background:${e.color||'#111111'};margin-right:6px"></span>${e.time?`<b>${e.time}</b> `:''}${esc(e.title)}${e.memo?`<span onclick="event.stopPropagation();openMemoFor('event',null,'${e.id}')" style="cursor:pointer;margin-left:4px" title="메모 보기">📝</span>`:''}</span></li>`).join('')}

          <span class="txt">${esc(x.text)}${x.memo?`<span onclick="event.stopPropagation();openMemoFor('todo','daily','${x.id}')" style="cursor:pointer;margin-left:4px" title="메모 보기">📝</span>`:''}</span>
          <span class="cat">${esc(x.cat||'해야 하는 일')}</span>
        </li>`).join('')}
      </ul>`}

window.openDay=ds=>{calSel=ds;calDiaryEditId=null;calDyPendingPhotos=[];modalOpen=true;render();};
window.closeDay=()=>{modalOpen=false;render();};
window.moveM=d=>{calM+=d;if(calM<0){calM=11;calY--}if(calM>11){calM=0;calY++}render();};
window.selDay=ds=>{calSel=ds;calDiaryEditId=null;calDyPendingPhotos=[];render();};
window.setDayTab=t=>{dayTab=t;render();};
window.addEv=()=>{
  const t=document.getElementById('evTitle').value.trim(); if(!t)return;
  D.events.push({id:uid(),date:calSel,title:t,time:document.getElementById('evTime').value,memo:getMemoValue('evMemo'),color:evColorPick});
  evMemoOpen=false;
  save();render();
};
window.delEv=id=>{D.events=D.events.filter(e=>e.id!==id);save();render();};
window.addDayTd=()=>{
  const t=document.getElementById('dTdText').value.trim(); if(!t)return;
  D.todos.daily.push({id:uid(),text:t,pri:+document.getElementById('dTdPri').value,cat:document.getElementById('dTdCat').value,done:false,date:calSel,memo:getMemoValue('dTdMemo')});
  dayTdMemoOpen=false;
  save();render();
};
window.editCalDy=id=>{
  calDiaryEditId=id;
  const d=D.diary.find(x=>x.id===id);
  if(d){ if(d.mood)calDiaryMood=d.mood; calDyPendingPhotos=(d.photos||[]).slice(); }
  render();
};
window.cancelCalDyEdit=()=>{calDiaryEditId=null;calDyPendingPhotos=[];render();};
window.handleCalDyPhotos=async(files)=>{
  for(const f of files){
    try{ calDyPendingPhotos.push(await compressImage(f)); }catch(e){console.error(e);}
  }
  render();
};
window.removeCalDyPhoto=i=>{calDyPendingPhotos.splice(i,1);render();};
window.saveCalDy=()=>{
  const t=document.getElementById('calDyText').value.trim(); if(!t)return;
  if(calDiaryEditId){
    const d=D.diary.find(x=>x.id===calDiaryEditId);
    if(d){d.text=t;d.mood=calDiaryMood;d.photos=calDyPendingPhotos.slice();}
    calDiaryEditId=null;
  }else{
    D.diary.push({id:uid(),date:calSel,mood:calDiaryMood,text:t,photos:calDyPendingPhotos.slice()});
  }
  calDyPendingPhotos=[];
  save();render();
};

    <span class="cat">${esc(x.cat||'해야 하는 일')}</span>

    <div class="row wrapm">

    </ul>

function catOptionsHTML(selected){
  return D.categories.map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');
}
window.setTodoTab=k=>{todoTab=k;render();};
window.setTodoCat=c=>{todoCat=c;render();};
window.addCategory=()=>{
  const inp=document.getElementById('newCatName'); if(!inp)return;
  const name=inp.value.trim(); if(!name)return;
  if(!D.categories.includes(name))D.categories.push(name);
  save();render();
};
window.delCategory=name=>{
  if(D.categories.length<=1){alert('최소 1개의 카테고리는 있어야 해요.');return;}
  if(!confirm(`'${name}' 카테고리를 삭제할까요? 이 카테고리를 쓰던 할 일은 그대로 남고, 필터·선택 목록에서만 빠집니다.`))return;
  D.categories=D.categories.filter(c=>c!==name);
  if(todoCat===name)todoCat='all';
  save();render();
};
window.addTodo=()=>{
  const t=document.getElementById('tdText').value.trim(); if(!t)return;
  D.todos[todoTab].push({id:uid(),text:t,pri:+document.getElementById('tdPri').value,cat:document.getElementById('tdCat').value,done:false,date:String(document.getElementById('tdDate').value),memo:getMemoValue('tdMemo')});
  todoMemoOpen=false;
  save();render();
};
window.tgTodo=(s,id)=>{const x=D.todos[s].find(i=>i.id===id);if(x){x.done=!x.done;save();render();}};
window.delTodo=(s,id)=>{D.todos[s]=D.todos[s].filter(i=>i.id!==id);save();render();};

function dday(ds){const diff=Math.ceil((new Date(ds)-new Date(todayS()))/86400000);return diff>0?'-'+diff:diff===0?'-Day':'+'+(-diff);}
window.addG=()=>{
  const t=document.getElementById('gTitle').value.trim(); if(!t)return;
  D.growth.push({id:uid(),title:t,plan:document.getElementById('gPlan').value.trim(),due:document.getElementById('gDue').value,prog:0,checks:[]});
  save();render();
};
window.setG=(id,v)=>{const g=D.growth.find(x=>x.id===id);if(g){g.prog=+v;save();render();}};
window.delG=id=>{if(confirm('이 목표를 삭제할까요?')){D.growth=D.growth.filter(x=>x.id!==id);save();render();}};
window.addCheck=gid=>{
  const inp=document.getElementById('ck-'+gid); if(!inp)return;
  const t=inp.value.trim(); if(!t)return;
  const g=D.growth.find(x=>x.id===gid); if(!g)return;
  if(!Array.isArray(g.checks))g.checks=[];
  g.checks.push({id:uid(),text:t,done:false,memo:getMemoValue('ckMemo-'+gid)});
  checkMemoOpen[gid]=false;
  save();render();
  const again=document.getElementById('ck-'+gid); if(again)again.focus();
};
window.tgCheck=(gid,cid)=>{
  const g=D.growth.find(x=>x.id===gid); if(!g)return;
  const c=(g.checks||[]).find(x=>x.id===cid); if(!c)return;
  c.done=!c.done; save();render();
};
window.toggleCheckTop=(gid,cid)=>{
  const g=D.growth.find(x=>x.id===gid); if(!g)return;
  const c=(g.checks||[]).find(x=>x.id===cid); if(!c)return;
  c.top=!c.top; save();render();
};
window.delCheck=(gid,cid)=>{
  const g=D.growth.find(x=>x.id===gid); if(!g)return;
  g.checks=(g.checks||[]).filter(x=>x.id!==cid);
  save();render();
};

  if(!n||!a||a<=0)return;
  const dVal=document.getElementById('fxDay').value; // yyyy-mm-dd
  const d=dVal?new Date(dVal+'T00:00').getDate():null;
  D.fixed.push({id:uid(),name:n,amount:a,day:d&&d>=1&&d<=31?d:null,bank:document.getElementById('fxBank').value.trim()});
  save();render();
};
window.delFix=id=>{D.fixed=D.fixed.filter(f=>f.id!==id);save();render();};
window.recFix=id=>{
  const f=D.fixed.find(x=>x.id===id); if(!f)return;
  const day=Math.min(f.day||1,new Date(monY,monM+1,0).getDate());
  const date=`${monY}-${String(monM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  D.ledger.push({id:uid(),date,type:'out',cat:'고정지출',bank:f.bank||'',amount:f.amount,memo:f.name});
  save();render();
};
/* 대출 */
window.addLoan=()=>{
  const n=document.getElementById('lnName').value.trim();
  const t=+document.getElementById('lnTotal').value;
  if(!n||!t||t<=0)return;
  D.loans.push({id:uid(),name:n,total:t,paid:0,bank:document.getElementById('lnBank').value.trim()});
  save();render();
};
window.payLoan=id=>{
  const inp=document.getElementById('pay-'+id); if(!inp)return;
  const a=+inp.value; if(!a||a<=0)return;
  const l=D.loans.find(x=>x.id===id); if(!l)return;
  l.paid+=a; save();render();
};
window.delLoan=id=>{if(confirm('이 대출 항목을 삭제할까요?')){D.loans=D.loans.filter(x=>x.id!==id);save();render();}};
/* 저금 */
window.addSav=()=>{
  const n=document.getElementById('svName').value.trim(); if(!n)return;
  const g=+document.getElementById('svGoal').value||0;
  D.savings.push({id:uid(),name:n,goal:g,saved:0,bank:document.getElementById('svBank').value.trim()});
  save();render();
};
window.depSav=id=>{
  const inp=document.getElementById('dep-'+id); if(!inp)return;
  const a=+inp.value; if(!a||a<=0)return;
  const s=D.savings.find(x=>x.id===id); if(!s)return;
  s.saved+=a; save();render();
};
window.delSav=id=>{if(confirm('이 저금 항목을 삭제할까요?')){D.savings=D.savings.filter(x=>x.id!==id);save();render();}};

/* ================= 일기 (전체 보기 탭) ================= */
const MOODS=['😄','🙂','😐','😢','😡','🥰'];
function diaryHTML(){
  const list=D.diary.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const editing=diaryEditId?D.diary.find(x=>x.id===diaryEditId):null;
  return `
  <div class="card">
    <h2>${editing?'일기 수정':'오늘의 일기'}</h2>
    <div class="row wrapm">
      <input id="dyDate" type="date" value="${editing?editing.date:todayS()}" style="flex:1;min-width:140px">
      <div class="mood-pick">${MOODS.map(m=>`<button class="${diaryMood===m?'on':''}" onclick="diaryMood='${m}';render()">${m}</button>`).join('')}</div>
    </div>
    <textarea id="dyText" class="mt" rows="5" placeholder="오늘 하루는 어땠나요? 솔직한 마음을 남겨보세요.">${editing?esc(editing.text):''}</textarea>
    <div class="row wrapm mt">
      <input type="file" id="dyPhotoInput" accept="image/*" multiple style="flex:1;min-width:180px" onchange="handleDyPhotos(this.files)">
    </div>
    ${photoStripHTML(dyPendingPhotos,'removeDyPhoto')}
    <div class="row mt" style="justify-content:flex-end">
      ${editing?`<button class="btn ghost" onclick="cancelDyEdit()">취소</button>`:''}
      <button class="btn" onclick="addDy()">${editing?'수정 완료':'일기 저장'}</button>
    </div>
  </div>
  <div class="mt">
    ${list.length?list.map(d=>`
      <div class="diary-entry" onclick="editDy('${d.id}')" title="눌러서 수정">
        <div class="d-head"><span><b>${d.date}</b> &nbsp;${d.mood||''}</span><button class="icon" onclick="event.stopPropagation();delDy('${d.id}')">✕</button></div>
        <div class="d-body">${esc(d.text)}</div>
        ${photoGridHTML(d.photos)}
      </div>`).join(''):'<div class="card"><div class="empty">아직 작성한 일기가 없어요.</div></div>'}
  </div>`;
}
window.handleDyPhotos=async(files)=>{
  for(const f of files){
    try{ dyPendingPhotos.push(await compressImage(f)); }catch(e){console.error(e);}
  }
  render();
};
window.removeDyPhoto=i=>{dyPendingPhotos.splice(i,1);render();};
window.cancelDyEdit=()=>{diaryEditId=null;dyPendingPhotos=[];render();};
window.editDy=id=>{
  diaryEditId=id;
  const d=D.diary.find(x=>x.id===id);
  if(d){ if(d.mood)diaryMood=d.mood; dyPendingPhotos=(d.photos||[]).slice(); }
  render();window.scrollTo({top:0,behavior:'smooth'});
};
window.addDy=()=>{
  const t=document.getElementById('dyText').value.trim(); if(!t)return;
  const date=document.getElementById('dyDate').value||todayS();
  if(diaryEditId){
    const d=D.diary.find(x=>x.id===diaryEditId);
    if(d){d.text=t;d.date=date;d.mood=diaryMood;d.photos=dyPendingPhotos.slice();}
    diaryEditId=null;
  }else{
    D.diary.push({id:uid(),date,mood:diaryMood,text:t,photos:dyPendingPhotos.slice()});
  }
  dyPendingPhotos=[];
  save();render();
};
window.delDy=id=>{if(confirm('이 일기를 삭제할까요?')){D.diary=D.diary.filter(x=>x.id!==id);if(diaryEditId===id){diaryEditId=null;dyPendingPhotos=[];}if(calDiaryEditId===id){calDiaryEditId=null;calDyPendingPhotos=[];}save();render();}};

/* ================= 백업 / 복원 ================= */
window.exportData=()=>{
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`인생기록실_백업_${todayS()}.json`;
  a.click();URL.revokeObjectURL(a.href);
};
window.importData=inp=>{
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const parsed=JSON.parse(r.result);
      if(!parsed.todos)throw new Error('형식 오류');
      if(confirm('현재 데이터를 백업 파일 내용으로 교체할까요?')){
        D=Object.assign({events:[],todos:{daily:[],monthly:[],yearly:[]},growth:[],bucket:[],diary:[],ledger:[],fixed:[],loans:[],savings:[]},parsed);
        migrate();save();render();
      }
    }catch(e){alert('백업 파일을 읽을 수 없습니다. 올바른 파일인지 확인해 주세요.');}
    inp.value='';
  };
  r.readAsText(f);
};

/* ================= Netlify Identity 인증 ================= */
function showApp(user){
  document.getElementById('gateScreen').style.display='none';
  document.getElementById('appRoot').style.display='block';
  document.getElementById('userEmail').textContent=user.email;
  load();
}
function showGate(){
  document.getElementById('appRoot').style.display='none';
  document.getElementById('gateScreen').style.display='flex';
}
netlifyIdentity.on('init', user=>{ user?showApp(user):showGate(); });
netlifyIdentity.on('login', user=>{ netlifyIdentity.close(); showApp(user); });
netlifyIdentity.on('logout', ()=>{ D={events:[],todos:{daily:[],monthly:[],yearly:[]},growth:[],bucket:[],diary:[],ledger:[],fixed:[],loans:[],savings:[]}; showGate(); });
netlifyIdentity.init();

/* 로그아웃 전에 대기 중인 저장을 반드시 먼저 끝냅니다 */
async function doLogout(){
  clearTimeout(saveTimer);
  await doSaveNow();
  netlifyIdentity.logout();
}
/* 탭을 닫거나 다른 페이지로 이동할 때도 마지막 변경사항을 전송합니다 */
window.addEventListener('beforeunload',()=>{
  if(saveTimer){clearTimeout(saveTimer);doSaveNow();}
});
window.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&saveTimer){clearTimeout(saveTimer);doSaveNow();}
});
</script>
